<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Omni-Cosmos Horoscope</title>
    <!-- Tailwind CDN is kept for simplicity -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #050510;
        color: #e2e8f0;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Cinzel', serif;
      }
      .glass-panel {
        background: rgba(20, 20, 40, 0.7);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  <script type="module" crossorigin src="./assets/index-C6668kkf.js"></script>
</head>
  <body>
    <div id="root">
      <main id="loading-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;background:#050510;color:#e2e8f0;">
        <div>
          <h1 style="margin:0 0 0.75rem 0;font-family:'Cinzel',serif;">Omni-Cosmos</h1>
          <p style="margin:0;color:#cbd5e1;">Loading your cosmic gateway...</p>
        </div>
      </main>
    </div>
    <!-- Recovery: stale-cached bundle auto-retry, then actionable fallback -->
    <script>
      (function () {
        var RETRY_FLAG = 'omni_retry_done';
        var fb = document.getElementById('loading-fallback');

        function hasMounted() {
          return !document.getElementById('loading-fallback');
        }

        function showRecoveryPanel() {
          var node = document.getElementById('loading-fallback');
          if (!node) return;
          node.innerHTML =
            '<div>' +
            '<h1 style="margin:0 0 0.75rem 0;font-family:serif;">Omni-Cosmos</h1>' +
            '<p style="margin:0 0 1rem;color:#94a3b8;">The app did not finish loading.</p>' +
            '<button onclick="localStorage.removeItem(\'' + RETRY_FLAG + '\');location.reload()" style="display:inline-block;margin-right:0.55rem;padding:0.6rem 1.15rem;background:#0e7490;color:#fff;border:none;border-radius:999px;cursor:pointer;font-weight:700;">Hard Refresh</button>' +
            '<a href="https://aaroncrume-techandtonic.github.io/OmniCosmosV2.1/?v=' + Date.now() + '" style="display:inline-block;padding:0.6rem 1.15rem;background:#1d4ed8;color:#fff;border-radius:999px;text-decoration:none;font-weight:700;">Open Fresh Copy</a>' +
            '</div>';
        }

        if (!fb) return;

        window.setTimeout(function () {
          if (hasMounted()) return;

          if (!localStorage.getItem(RETRY_FLAG)) {
            localStorage.setItem(RETRY_FLAG, '1');
            var joiner = location.search ? '&' : '?';
            location.replace(location.pathname + location.search + joiner + 'v=' + Date.now());
            return;
          }

          showRecoveryPanel();
        }, 4500);
      })();
    </script>

  </body>
</html>
