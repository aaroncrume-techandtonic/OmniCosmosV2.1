<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Omni-Cosmos Horoscope</title>
    <!-- Tailwind CDN is kept for simplicity -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Quicksand', sans-serif;
        background-color: #050510;
        color: #e2e8f0;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Cinzel', serif;
      }
      .glass-panel {
        background: rgba(20, 20, 40, 0.7);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
</head>
  <body>
    <div id="root">
      <main id="loading-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;background:#050510;color:#e2e8f0;">
        <div>
          <h1 style="margin:0 0 0.75rem 0;font-family:'Cinzel',serif;">Omni-Cosmos</h1>
          <p style="margin:0;color:#cbd5e1;">Loading your cosmic gateway...</p>
        </div>
      </main>
    </div>
    <!-- Fallback: if React hasn't mounted after 10s, show a direct link -->
    <script>
      setTimeout(function() {
        var fb = document.getElementById('loading-fallback');
        if (fb) {
          fb.innerHTML = '<div><h1 style="margin:0 0 0.75rem 0;font-family:serif;">Omni-Cosmos</h1><p style="margin:0 0 1rem;color:#94a3b8;">App is taking too long to load.</p><a href="https://aaroncrume-techandtonic.github.io/OmniCosmosV2.1/" style="display:inline-block;padding:0.6rem 1.5rem;background:#0e7490;color:#fff;border-radius:999px;text-decoration:none;font-weight:700;">Open in Full Tab</a></div>';
        }
      }, 10000);
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
